    '<td class="score ' + scoreClass(u.score) + '">' + u.score + '</td>' +

    '<td>' + u.surv + '%</td><td class="bar-cell">' + bar(u.surv, 'surv') + '</td>' +
    '<td>' + u.obj + '%</td><td class="bar-cell">' + bar(u.obj, 'obj') + '</td>' +
    '<td>' + u.mob + '%</td><td class="bar-cell">' + bar(u.mob, 'mob') + '</td>' +
    '<td>' + (u.ds ? '<span class="tag tag-ds">DS</span>' : '') + (u.fly ? '<span class="tag tag-fly">FLY</span>' : '') +
    (u.inv ? '<span class="tag tag-inv">INV ' + u.inv + '</span>' : '') + '</td>' +
    '<td style="font-size:10px;color:#78909c">T' + u.t + ' W' + u.w + ' OC' + u.oc + '</td></tr>';
}
function filterMission(mid) {
  var q = document.getElementById('search-' + mid).value.toLowerCase();
  var rows = document.getElementById('table-' + mid).querySelectorAll('tr[data-name]');
  var shown = 0;
  rows.forEach(function(r) { var m = !q || r.getAttribute('data-name').indexOf(q) !== -1; r.style.display = m ? '' : 'none'; if (m) shown++; });
  document.getElementById('count-' + mid).textContent = shown + ' / ' + rows.length + ' units';
}
function renderMissions() {
  var c = document.getElementById('missions');
  var html = '';
  for (var mission in DATA) {
    var units = DATA[mission], w = WEIGHTS[mission], mid = mission.replace(/[^a-z]/gi, '');
    html += '<div class="mission-card"><div class="mission-header"><div class="mission-name">' + mission + ' <span style="font-size:13px;color:#78909c">(' + units.length + ' units)</span></div>' +
      '<div class="mission-weights"><span class="weight w-dpp">DPP ' + w.dps + '%</span><span class="weight w-surv">SURV ' + w.surv + '%</span><span class="weight w-obj">OBJ ' + w.obj + '%</span><span class="weight w-mob">MOB ' + w.mob + '%</span></div></div>' +
      '<div class="search-bar"><input id="search-' + mid + '" type="text" placeholder="Search units..." oninput="filterMission(\'' + mid + '\')"><span class="count" id="count-' + mid + '">' + units.length + ' / ' + units.length + ' units</span></div>' +
      '<div class="table-scroll"><table id="table-' + mid + '"><tr><th>#</th><th>Unit</th><th>Pts</th><th>Score</th><th>DPP</th><th class="bar-cell"></th><th>SURV</th><th class="bar-cell"></th><th>OBJ</th><th class="bar-cell"></th><th>MOB</th><th class="bar-cell"></th><th>Tags</th><th>Profile</th></tr>';
    units.forEach(function(u, i) { html += renderRow(u, i); });
    html += '</table></div></div>';
  }
  c.innerHTML = html;
}
function renderTop10() {
  var c = document.getElementById('top10'), unitData = {};
  for (var mission in DATA) { var units = DATA[mission]; for (var i = 0; i < units.length; i++) { var u = units[i]; if (!unitData[u.name]) unitData[u.name] = {name:u.name,pts:u.pts,ds:u.ds,fly:u.fly,inv:u.inv,t:u.t,w:u.w,oc:u.oc,missions:{}}; unitData[u.name].missions[mission] = {score:u.score,rank:i+1}; }}
  for (var k in unitData) { var u = unitData[k], scores = Object.values(u.missions).map(function(m){return m.score;}); u.avgScore = Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length*10)/10; }
  var sorted = Object.values(unitData).sort(function(a,b){return b.avgScore-a.avgScore;}).slice(0,20);
  var html = '<h2>Top 20 Units (Avg Score Across All Missions)</h2>';
  sorted.forEach(function(u, idx) {
    var badges = Object.entries(u.missions).sort(function(a,b){return b[1].score-a[1].score;}).map(function(kv){var m=kv[0],v=kv[1];return '<span class="mission-badge '+(v.rank===1?'top1':v.rank<=3?'top3':'top5')+'">#'+v.rank+' '+m+' ('+v.score+')</span>';}).join(' ');
    var bc=['#ffd700','#c0c0c0','#cd7f32'];
    html += '<div class="insight-card" style="border-left-color:'+(idx<3?bc[idx]:'#4fc3f7')+'"><div class="insight-title" style="display:flex;justify-content:space-between"><span>#'+(idx+1)+' '+u.name+'</span><span class="pts">'+u.pts+'pts · avg '+u.avgScore+'</span></div><div style="margin:6px 0">'+(u.ds?'<span class="tag tag-ds">DS</span>':'')+(u.fly?'<span class="tag tag-fly">FLY</span>':'')+(u.inv?'<span class="tag tag-inv">INV '+u.inv+'</span>':'')+'<span style="font-size:11px;color:#78909c;margin-left:8px">T'+u.t+' W'+u.w+' OC'+u.oc+'</span></div><div>'+badges+'</div></div>';
  });
  c.innerHTML = html;
}
function renderInsights() {
  var c = document.getElementById('insights'), html = '<h2>Key Insights</h2>';
  for (var mission in DATA) { var units = DATA[mission]; if (units.length > 0) { var u = units[0]; html += '<div class="insight-card"><div class="insight-title">#1 in '+mission+': '+u.name+'</div><div class="insight-text">'+u.score+' score · '+u.pts+'pts · '+u.dpp+' DPP · T'+u.t+' W'+u.w+(u.inv?' INV'+u.inv:'')+(u.ds?' DS':'')+(u.fly?' FLY':'')+' OC'+u.oc+'</div></div>'; }}
  c.innerHTML = html;
}
renderMissions(); renderTop10(); renderInsights();

</script></body></html>
