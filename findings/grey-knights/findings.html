const WEIGHTS = {"Take and Hold": {"dps": 0, "surv": 25, "obj": 55, "mob": 20}, "Purge the Foe": {"dps": 60, "surv": 15, "obj": 5, "mob": 20}, "Reconnaissance": {"dps": 10, "surv": 10, "obj": 20, "mob": 60}, "Priority Assets": {"dps": 40, "surv": 20, "obj": 30, "mob": 10}, "Disruption": {"dps": 25, "surv": 15, "obj": 25, "mob": 35}};

function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function scoreClass(s) {
  if (s >= 75) return 'score-high';
  if (s >= 50) return 'score-mid';
  return 'score-low';
}

function rankClass(r) {
  if (r === 1) return 'rank rank-1';
  if (r === 2) return 'rank rank-2';
  if (r === 3) return 'rank rank-3';
  return 'rank';
}

function bar(pct, cls) {
  return '<div class="bar-bg"><div class="bar-fill ' + cls + '" style="width:' + pct + '%"></div><div class="bar-label">' + pct + '%</div></div>';
}

function renderMissions() {
  const c = document.getElementById('missions');
  let html = '';
  for (const [mission, units] of Object.entries(DATA)) {
    const w = WEIGHTS[mission];
    html += '<div class="mission-card">' +
      '<div class="mission-header">' +
        '<div class="mission-name">' + mission + ' <span style="font-size:13px;color:#78909c">(' + units.length + ' units)</span></div>' +
        '<div class="mission-weights">' +
          '<span class="weight w-dpp">DPP ' + w.dps + '%</span>' +
          '<span class="weight w-surv">SURV ' + w.surv + '%</span>' +
          '<span class="weight w-obj">OBJ ' + w.obj + '%</span>' +
          '<span class="weight w-mob">MOB ' + w.mob + '%</span>' +
        '</div>' +
      '</div>' +
      '<div class="table-scroll"><table><tr><th>#</th><th>Unit</th><th>Pts</th><th>Score</th>' +
        '<th>DPP</th><th class="bar-cell"></th>' +
        '<th>SURV</th><th class="bar-cell"></th>' +
        '<th>OBJ</th><th class="bar-cell"></th>' +
        '<th>MOB</th><th class="bar-cell"></th>' +
        '<th>Tags</th><th>Profile</th></tr>';
    units.forEach(function(u, i) {
      html += '<tr class="' + (i < 3 ? 'top3' : '') + '">' +
        '<td class="' + rankClass(i+1) + '">' + (i+1) + '</td>' +
        '<td class="unit-name">' + u.name + '</td>' +
        '<td class="pts">' + u.pts + '</td>' +
        '<td class="score ' + scoreClass(u.score) + '">' + u.score + '</td>' +
        '<td>' + u.dpp + '</td>' +
        '<td class="bar-cell">' + bar(u.dpp_pct, 'dpp') + '</td>' +
        '<td>' + u.surv + '%</td>' +
        '<td class="bar-cell">' + bar(u.surv, 'surv') + '</td>' +
        '<td>' + u.obj + '%</td>' +
        '<td class="bar-cell">' + bar(u.obj, 'obj') + '</td>' +
        '<td>' + u.mob + '%</td>' +
        '<td class="bar-cell">' + bar(u.mob, 'mob') + '</td>' +
        '<td>' + (u.ds ? '<span class="tag tag-ds">DS</span>' : '') +
                 (u.fly ? '<span class="tag tag-fly">FLY</span>' : '') +
                 (u.inv ? '<span class="tag tag-inv">INV ' + u.inv + '</span>' : '') + '</td>' +
        '<td style="font-size:10px;color:#78909c">T' + u.t + ' W' + u.w + ' OC' + u.oc + '</td>' +
        '</tr>';
    });
    html += '</table></div></div>';
  }
  c.innerHTML = html;
}

function renderTop10() {
  const c = document.getElementById('top10');
  const unitData = {};
  for (const [mission, units] of Object.entries(DATA)) {
    for (let i = 0; i < units.length; i++) {
      const u = units[i];
      if (!unitData[u.name]) {
        unitData[u.name] = { name: u.name, pts: u.pts, ds: u.ds, fly: u.fly, inv: u.inv, t: u.t, w: u.w, oc: u.oc, missions: {} };
      }
      unitData[u.name].missions[mission] = { score: u.score, rank: i + 1 };
    }
  }
  for (const u of Object.values(unitData)) {
    const scores = Object.values(u.missions).map(function(m) { return m.score; });
    u.avgScore = Math.round(scores.reduce(function(a, b) { return a + b; }, 0) / scores.length * 10) / 10;
  }
  const sorted = Object.values(unitData).sort(function(a, b) { return b.avgScore - a.avgScore; }).slice(0, 10);

  let html = '<h2>Top 10 Units (Avg Score Across All Missions)</h2>';
  sorted.forEach(function(u, idx) {
    const missionBadges = Object.entries(u.missions)
      .sort(function(a, b) { return b[1].score - a[1].score; })
      .map(function(kv) {
        const m = kv[0], v = kv[1];
        const cls = v.rank === 1 ? 'top1' : (v.rank <= 3 ? 'top3' : 'top5');
        return '<span class="mission-badge ' + cls + '">#' + v.rank + ' ' + m + ' (' + v.score + ')</span>';
      }).join(' ');
    const borderColors = ['#ffd700', '#c0c0c0', '#cd7f32'];
    const borderColor = idx < 3 ? borderColors[idx] : '#4fc3f7';
    html += '<div class="insight-card" style="border-left-color:' + borderColor + '">' +
      '<div class="insight-title" style="display:flex;justify-content:space-between">' +
        '<span>#' + (idx+1) + ' ' + u.name + '</span>' +
        '<span class="pts">' + u.pts + 'pts · avg ' + u.avgScore + '</span>' +
      '</div>' +
      '<div style="margin:6px 0">' +
        (u.ds ? '<span class="tag tag-ds">DS</span>' : '') +
        (u.fly ? '<span class="tag tag-fly">FLY</span>' : '') +
        (u.inv ? '<span class="tag tag-inv">INV ' + u.inv + '</span>' : '') +
        '<span style="font-size:11px;color:#78909c;margin-left:8px">T' + u.t + ' W' + u.w + ' OC' + u.oc + '</span>' +
      '</div>' +
      '<div>' + missionBadges + '</div>' +
    '</div>';
  });
  c.innerHTML = html;
}

function renderInsights() {
  const c = document.getElementById('insights');
  const rows = [];
  for (const [mission, units] of Object.entries(DATA)) {
    if (units.length > 0) {
      const u = units[0];
      rows.push('<div class="insight-card">' +
        '<div class="insight-title">#1 in ' + mission + ': ' + u.name + '</div>' +
        '<div class="insight-text">' + u.score + ' score · ' + u.pts + 'pts · ' + u.dpp + ' DPP · T' + u.t + ' W' + u.w +
        (u.inv ? ' INV' + u.inv : '') + (u.ds ? ' DS' : '') + (u.fly ? ' FLY' : '') + ' OC' + u.oc + '</div>' +
      '</div>');
    }
  }
  c.innerHTML = '<h2>Key Insights</h2>' + rows.join('');
}

renderMissions();
renderTop10();
renderInsights();
