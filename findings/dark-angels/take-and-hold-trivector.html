function role(u) {
  if (u.pts <= 100 && u.ds) return 'disposable';
  if (u.pts <= 100 && !u.ds) return 'cheap';
  if (u.pts >= 200 && u.surv >= 75) return 'anvil';
  if (u.fly && u.ds) return 'mobile';
  return '';
}

function tierClass(t) {
  return 'tier-' + t;
}

function scoreClass(s) {
  if (s >= 70) return 'score-high';
  if (s >= 45) return 'score-mid';
  return 'score-low';
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach((u, i) => {
    const r = i + 1;
    const role_ = role(u);
    const isTop5 = r <= 5;
    
    let tags = '';
    if (u.ds) tags += '<span class="tag tag-ds">DS</span> ';
    if (u.fly) tags += '<span class="tag tag-fly">FLY</span> ';
    if (u.fnp) tags += '<span class="tag tag-dr">FNP ' + u.fnp + '</span> ';
    if (u.inv) tags += '<span class="tag tag-anvil">INV ' + u.inv + '</span> ';
    
    let roleTag = '';
    if (role_ === 'anvil') roleTag = '<span class="tag tag-anvil">ANVIL</span>';
    else if (role_ === 'disposable') roleTag = '<span class="tag tag-disposable">DISPOSABLE</span>';
    else if (role_ === 'mobile') roleTag = '<span class="tag tag-mobile">MOBILE</span>';
    
    const tr = document.createElement('tr');
    if (isTop5) tr.className = 'top5';
    tr.dataset.tier = u.tier;
    tr.dataset.ds = u.ds;
    tr.dataset.fly = u.fly;
    tr.dataset.dr = (u.fnp !== null) ? 'true' : 'false';
    tr.dataset.inv = (u.inv !== '') ? 'true' : 'false';
    tr.dataset.name = u.name.toLowerCase();
    
    tr.innerHTML = `
      <td>${r}</td>
      <td><span class="unit-name">${u.name}</span> ${roleTag}</td>
      <td class="pts">${u.pts}</td>
      <td class="score ${scoreClass(u.score)}">${u.score.toFixed(1)}</td>
      <td>${u.surv}%</td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill surv" style="width:${u.surv}%"></div><div class="bar-label">${u.surv}%</div></div></td>
      <td>${u.mob}%</td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill mob" style="width:${u.mob}%"></div><div class="bar-label">${u.mob}%</div></div></td>
      <td><span class="tier-badge ${tierClass(u.tier)}">${u.tier}</span></td>
      <td>${tags}</td>
      <td>T${u.t} W${u.w} ${u.inv || ''} ${u.fnp ? 'FNP' + u.fnp : ''}</td>
      <td>${u.surv_turns}</td>
      <td>${u.oc}</td>
      <td style="font-size:11px;color:#78909c;max-width:300px;overflow:hidden;text-overflow:ellipsis">${u.loadout}</td>
    `;
    tbody.appendChild(tr);
  });
}

function filterTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const tier = document.getElementById('tierFilter').value;
  const tag = document.getElementById('tagFilter').value;
  
  document.querySelectorAll('#tbody tr').forEach(tr => {
    let show = true;
    if (search && !tr.dataset.name.includes(search)) show = false;
    if (tier && tr.dataset.tier !== tier) show = false;
    if (tag === 'ds' && tr.dataset.ds !== 'true') show = false;
    if (tag === 'fly' && tr.dataset.fly !== 'true') show = false;
    if (tag === 'dr' && tr.dataset.dr !== 'true') show = false;
    if (tag === 'inv' && tr.dataset.inv !== 'true') show = false;
    
    tr.classList.toggle('hidden', !show);
  });
}

// Sort
let sortCol = 'score';
let sortDir = -1;

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = -1; }
    
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc', 'sorted-desc'));
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    
    const sorted = [...DATA].sort((a, b) => {
      let va = a[col], vb = b[col];
      if (typeof va === 'string') return sortDir * va.localeCompare(vb);
      return sortDir * ((va || 0) - (vb || 0));
    });
    renderTable(sorted);
  });
});

renderTable(DATA);
</script>
