let currentSort = 'score';
let currentDir = 'desc';
let activeRoleFilter = null;

function getRole(u) {
  if (u.pts >= 200) return 'premium';
  if (u.surv_pct >= 80 && u.mob_pct >= 70) return 'anchor';
  if (u.mob_pct >= 80) return 'mobile';
  if (u.pts <= 80) return 'disposable';
  return 'standard';
}

function getRoleLabel(role) {
  const labels = {anchor:'Anchor',mobile:'Mobile',disposable:'Disposable',premium:'Premium',standard:'Standard'};
  return labels[role] || role;
}

function initFilters() {
  const roles = [...new Set(DATA.map(getRole))];
  const container = document.getElementById('roleFilters');
  container.innerHTML = '<button class="filter-btn active" onclick="setRoleFilter(null)">All</button>';
  roles.forEach(r => {
    container.innerHTML += `<button class="filter-btn" onclick="setRoleFilter('${r}')">${getRoleLabel(r)}</button>`;
  });
}

function setRoleFilter(role) {
  activeRoleFilter = role;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderTable();
}

function renderTable() {
  const sortBy = document.getElementById('sortBy').value;
  const minScore = parseInt(document.getElementById('minScore').value);
  document.getElementById('minScoreVal').textContent = minScore;

  let filtered = DATA.filter(u => u.score >= minScore);
  if (activeRoleFilter) filtered = filtered.filter(u => getRole(u) === activeRoleFilter);

  filtered.sort((a, b) => {
    let va = a[sortBy], vb = b[sortBy];
    if (typeof va === 'string') return currentDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return currentDir === 'asc' ? va - vb : vb - va;
  });

  const cols = [
    {key:'name', label:'Unit', w:'200px'},
    {key:'pts', label:'Pts', w:'50px'},
    {key:'score', label:'Score', w:'60px'},
    {key:'dpp_pct', label:'DPP', w:'120px', bar:true},
    {key:'surv_pct', label:'SURV', w:'120px', bar:true},
    {key:'mob_pct', label:'MOB', w:'120px', bar:true},
    {key:'role', label:'Role', w:'80px'},
    {key:'t', label:'T', w:'30px'},
    {key:'sv', label:'Sv', w:'35px'},
    {key:'inv', label:'Inv', w:'35px'},
    {key:'w', label:'W', w:'30px'},
    {key:'loadout', label:'Loadout', w:'250px'},
  ];

  document.getElementById('headerRow').innerHTML = cols.map(c =>
    `<th style="width:${c.w}" onclick="toggleSort('${c.key}')">${c.label}</th>`
  ).join('');

  document.getElementById('tableBody').innerHTML = filtered.map((u, i) => {
    const role = getRole(u);
    return `<tr>
      <td><strong>${u.name}</strong></td>
      <td>${u.pts}</td>
      <td><strong>${u.score}</strong></td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill dpp" style="width:${u.dpp_pct}%"></div><span class="bar-label">${u.dpp_pct}%</span></div></td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill surv" style="width:${u.surv_pct}%"></div><span class="bar-label">${u.surv_pct}%</span></div></td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill mob" style="width:${u.mob_pct}%"></div><span class="bar-label">${u.mob_pct}%</span></div></td>
      <td><span class="role-tag role-${role}">${getRoleLabel(role)}</span></td>
      <td>${u.t}</td>
      <td>${u.sv}</td>
      <td>${u.inv || '-'}</td>
      <td>${u.w}</td>
      <td style="font-size:0.75rem;color:#999">${u.loadout}</td>
    </tr>`;
  }).join('');

  document.getElementById('statsBar').innerHTML = `
    <span>Units: ${filtered.length}</span>
    <span>Avg Score: ${filtered.length ? (filtered.reduce((s,u)=>s+u.score,0)/filtered.length).toFixed(1) : 0}</span>
    <span>Top: ${filtered.length ? filtered[0].name : 'N/A'}</span>
  `;
}

function toggleSort(key) {
  if (currentSort === key) currentDir = currentDir === 'asc' ? 'desc' : 'asc';
  else { currentSort = key; currentDir = 'desc'; }
  document.getElementById('sortBy').value = key;
  renderTable();
}

initFilters();
renderTable();
</script>
