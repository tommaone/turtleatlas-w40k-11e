* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e14; color: #c5cdd9; padding: 20px; }
a { color: #4fc3f7; text-decoration: none; }
a:hover { text-decoration: underline; }
.back { margin-bottom: 16px; font-size: 13px; }
h1 { color: #4fc3f7; font-size: 28px; margin-bottom: 4px; }
h2 { color: #81c784; font-size: 20px; margin: 30px 0 15px; border-bottom: 1px solid #1a2030; padding-bottom: 8px; }
.subtitle { color: #78909c; font-size: 14px; margin-bottom: 20px; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 10px 20px; background: #151b24; border: 1px solid #263238; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; color: #90a4ae; transition: all 0.2s; }
.tab:hover { background: #1a2030; color: #c5cdd9; }
.tab.active { background: #0d2137; color: #4fc3f7; border-color: #4fc3f7; border-bottom-color: #0d2137; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.mission-card { background: #151b24; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #1a2030; }
.mission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 8px; }
.mission-name { font-size: 18px; font-weight: 700; color: #eceff1; }
.mission-weights { display: flex; gap: 10px; }
.weight { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.w-dpp { background: #b71c1c; color: #ef9a9a; }
.w-surv { background: #1b5e20; color: #81c784; }
.w-mob { background: #0d47a1; color: #64b5f6; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #1a2030; color: #90a4ae; padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid #1a2030; }
tr:hover { background: #141c28; }
tr.top3 { background: #0d2137; }
.rank { font-weight: 700; color: #4fc3f7; width: 40px; }
.rank-1 { color: #ffd700; }
.rank-2 { color: #c0c0c0; }
.rank-3 { color: #cd7f32; }
.unit-name { font-weight: 600; color: #eceff1; }
.pts { font-weight: 600; color: #ffa726; }
.score { font-weight: 700; font-size: 14px; }
.score-high { color: #66bb6a; }
.score-mid { color: #ffa726; }
.score-low { color: #ef5350; }
.bar-cell { width: 100px; }
.bar-bg { background: #1a2030; border-radius: 3px; height: 16px; position: relative; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; position: absolute; top: 0; left: 0; }
.bar-fill.surv { background: linear-gradient(90deg, #1b5e20, #4caf50); }
.bar-fill.mob { background: linear-gradient(90deg, #0d47a1, #42a5f5); }
.bar-label { position: absolute; right: 4px; top: 0; font-size: 10px; font-weight: 600; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8); line-height: 16px; }
.tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-left: 4px; }
.tag-ds { background: #1a237e; color: #7986cb; }
.tag-fly { background: #4a148c; color: #ba68c8; }
.tag-inv { background: #e65100; color: #ffcc80; }
.insight-card { background: #151b24; border-radius: 8px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #4fc3f7; }
.insight-title { font-weight: 700; color: #eceff1; margin-bottom: 6px; }
.insight-text { font-size: 13px; color: #b0bec5; }
</style>
</head>

function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function scoreClass(s) {
  if (s >= 75) return 'score-high';
  if (s >= 50) return 'score-mid';
  return 'score-low';
}

function rankClass(r) {
  if (r === 1) return 'rank rank-1';
  if (r === 2) return 'rank rank-2';
  if (r === 3) return 'rank rank-3';
  return 'rank';
}

              ${u.fly ? '<span class="tag tag-fly">FLY</span>' : ''}
              ${u.inv ? '<span class="tag tag-inv">INV ' + u.inv + '</span>' : ''}
            </td>
            <td style="font-size:11px;color:#78909c">T${u.t} W${u.w} OC${u.oc}</td>
          </tr>
        `).join('')}
      </table>
    </div>`;
  }
  c.innerHTML = html;
}

function renderTop10() {
  const c = document.getElementById('top10');
  const best = {};
  for (const [mission, units] of Object.entries(DATA)) {
    for (const u of units.slice(0, 15)) {
      if (!best[u.name] || u.score > best[u.name].score) {
        best[u.name] = { ...u, mission };
      }
    }
  }
  const sorted = Object.values(best).sort((a, b) => b.score - a.score).slice(0, 10);
  let html = `<h2>Top 10 Units (Best Mission Score)</h2>
    <table>
      <tr><th>#</th><th>Unit</th><th>Pts</th><th>Score</th><th>Best Mission</th><th>DPP</th><th>Tags</th><th>Profile</th></tr>
      ${sorted.map((u, i) => `
        <tr class="${i < 3 ? 'top3' : ''}">
          <td class="${rankClass(i+1)}">${i+1}</td>
          <td class="unit-name">${u.name}</td>
          <td class="pts">${u.pts}</td>
          <td class="score ${scoreClass(u.score)}">${u.score}</td>
          <td style="color:#90a4ae">${u.mission}</td>
          <td>${u.dpp}</td>
          <td>
            ${u.ds ? '<span class="tag tag-ds">DS</span>' : ''}
            ${u.fly ? '<span class="tag tag-fly">FLY</span>' : ''}
            ${u.inv ? '<span class="tag tag-inv">INV ' + u.inv + '</span>' : ''}
          </td>
          <td style="font-size:11px;color:#78909c">T${u.t} W${u.w} OC${u.oc}</td>
        </tr>
      `).join('')}
    </table>`;
  c.innerHTML = html;
}

function renderInsights() {
  const c = document.getElementById('insights');
  const rows = [];
  for (const [mission, units] of Object.entries(DATA)) {
    if (units.length > 0) {
      const u = units[0];
      rows.push(`<div class="insight-card">
        <div class="insight-title">#1 in ${mission}: ${u.name}</div>
        <div class="insight-text">${u.score} score &middot; ${u.pts}pts &middot; ${u.dpp} DPP &middot; T${u.t} W${u.w}${u.inv ? ' INV'+u.inv : ''}${u.ds ? ' DS' : ''}${u.fly ? ' FLY' : ''}</div>
      </div>`);
    }
  }
  c.innerHTML = '<h2>Key Insights</h2>' + rows.join('');
}

renderMissions();
renderTop10();
renderInsights();
</script>
</body>
</html>
