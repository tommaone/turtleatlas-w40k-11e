<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warhammer 40k — Faction Findings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e14; color: #c5cdd9; padding: 40px; }
h1 { color: #4fc3f7; font-size: 32px; margin-bottom: 8px; }
.sub { color: #78909c; font-size: 14px; margin-bottom: 30px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card { background: #151b24; border: 1px solid #263238; border-radius: 8px; padding: 24px; transition: all 0.2s; }
.card:hover { border-color: #4fc3f7; transform: translateY(-2px); }
.card a { text-decoration: none; color: inherit; display: block; }
.card-name { font-size: 20px; font-weight: 700; color: #eceff1; margin-bottom: 6px; }
.card-count { font-size: 13px; color: #90a4ae; }
.card-arrow { float: right; color: #4fc3f7; font-size: 20px; margin-top: -20px; }
</style>
<script>
const FACTIONS = [
  ["adepta-sororitas", "Adepta Sororitas"],
  ["adeptus-custodes", "Adeptus Custodes"],
  ["adeptus-mechanicus", "Adeptus Mechanicus"],
  ["aeldari", "Aeldari"],
  ["astra-militarum", "Astra Militarum"],
  ["black-templars", "Black Templars"],
  ["blood-angels", "Blood Angels"],
  ["chaos-daemons", "Chaos Daemons"],
  ["chaos-knights", "Chaos Knights"],
  ["chaos-space-marines", "Chaos Space Marines"],
  ["dark-angels", "Dark Angels"],
  ["death-guard", "Death Guard"],
  ["deathwatch", "Deathwatch"],
  ["drukhari", "Drukhari"],
  ["emperors-children", "Emperor's Children"],
  ["genestealer-cults", "Genestealer Cults"],
  ["grey-knights", "Grey Knights"],
  ["imperial-agents", "Imperial Agents"],
  ["imperial-knights", "Imperial Knights"],
  ["leagues-of-votann", "Leagues of Votann"],
  ["necrons", "Necrons"],
  ["orks", "Orks"],
  ["space-marines", "Space Marines"],
  ["space-wolves", "Space Wolves"],
  ["tau-empire", "T'au Empire"],
  ["thousand-sons", "Thousand Sons"],
  ["tyranids", "Tyranids"],
  ["world-eaters", "World Eaters"],
];
</script>
</head>
<body>
<h1>Warhammer 40k — Faction Findings</h1>
<div class="sub">Quad-vector scoring engine &middot; DPP + SURV + OBJ + MOB &middot; 5 mission profiles &middot; 28 factions</div>

<div class="grid" id="grid"></div>

<script>
const BASE_RAW = 'https://raw.githubusercontent.com/tommaone/turtleatlas-w40k-11e/main/findings/';
const BASE_PREVIEW = 'https://htmlpreview.github.io/?' + BASE_RAW;
const isPreview = window.location.href.includes('htmlpreview.github.io');
const base = isPreview ? BASE_PREVIEW : '';

const grid = document.getElementById('grid');
FACTIONS.forEach(([slug, name]) => {
  const card = document.createElement('div');
  card.className = 'card';
  const href = base + slug + '/findings.html';
  card.innerHTML = `<a href="${href}"><div class="card-name">${name}</div><div class="card-arrow">&rarr;</div></a>`;
  grid.appendChild(card);
});
</script>

</body>
</html>
