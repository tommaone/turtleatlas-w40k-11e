<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warhammer 40k — Faction Findings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e14; color: #c5cdd9; padding: 40px; }
h1 { color: #4fc3f7; font-size: 32px; margin-bottom: 8px; }
.sub { color: #78909c; font-size: 14px; margin-bottom: 30px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card { background: #151b24; border: 1px solid #263238; border-radius: 8px; padding: 24px; transition: all 0.2s; }
.card:hover { border-color: #4fc3f7; transform: translateY(-2px); }
.card a { text-decoration: none; color: inherit; display: block; }
.card-name { font-size: 20px; font-weight: 700; color: #eceff1; margin-bottom: 6px; }
.card-count { font-size: 13px; color: #90a4ae; }
.card-arrow { float: right; color: #4fc3f7; font-size: 20px; margin-top: -20px; }
</style>
</head>
<body>
<h1>Warhammer 40k — Faction Findings</h1>
<div class="sub">Quad-vector scoring engine &middot; DPP + SURV + OBJ + MOB &middot; 5 mission profiles</div>

<div class="grid">
  <div class="card">
    <a href="dark-angels/findings.html">
      <div class="card-name">Dark Angels</div>
      <div class="card-count">105 datasheets</div>
      <div class="card-arrow">&rarr;</div>
    </a>
  </div>
  <div class="card">
    <a href="grey-knights/findings.html">
      <div class="card-name">Grey Knights</div>
      <div class="card-count">27 datasheets</div>
      <div class="card-arrow">&rarr;</div>
    </a>
  </div>
  <div class="card">
    <a href="chaos-knights/findings.html">
      <div class="card-name">Chaos Knights</div>
      <div class="card-count">19 datasheets</div>
      <div class="card-arrow">&rarr;</div>
    </a>
  </div>
  <div class="card">
    <a href="chaos-daemons/findings.html">
      <div class="card-name">Chaos Daemons</div>
      <div class="card-count">53 datasheets</div>
      <div class="card-arrow">&rarr;</div>
    </a>
  </div>
  <div class="card">
    <a href="space-marines/findings.html">
      <div class="card-name">Space Marines</div>
      <div class="card-count">100 datasheets</div>
      <div class="card-arrow">&rarr;</div>
    </a>
  </div>
</div>

</body>
</html>
